# GitHub Pages deploy — publikuje current_report.md jako stronę
name: Deploy Report to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "reports/current_report.md"
      - "reports/history/**"

  # Ręczne uruchomienie
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build report site
        run: |
          mkdir -p _site
          
          # Główna strona — aktualny raport (zapisujemy jako .md, by Jekyll zrenderował zawartość)
          cat > _site/index.md << 'HEADER'
          <!DOCTYPE html>
          <html lang="pl">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Raport Audytu Marketingowego</title>
            <style>
              body { 
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                max-width: 900px; margin: 0 auto; padding: 2rem;
                color: #1a1a2e; background: #f5f5f7;
                line-height: 1.6;
              }
              table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
              th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
              th { background: #1a1a2e; color: white; }
              tr:nth-child(even) { background: #f9f9f9; }
              h1 { color: #1a1a2e; border-bottom: 3px solid #6c63ff; padding-bottom: 0.5rem; }
              h2 { color: #2d2d44; margin-top: 2rem; }
              h3 { color: #6c63ff; }
              code { background: #e8e8ee; padding: 2px 6px; border-radius: 3px; }
              a { color: #6c63ff; }
              .nav { background: #1a1a2e; color: white; padding: 1rem; margin: -2rem -2rem 2rem; text-align: center; }
              .nav a { color: #a5a0ff; margin: 0 1rem; }
            </style>
          </head>
          <body>
          <div class="nav">
            <strong>IlluminArt Ads Audit</strong>
            <a href="index.html">Aktualny raport</a>
            <a href="history.html">Historia</a>
          </div>
          HEADER
          
          # Doklejamy zawartość markdowna do index.md, aby wyświetlał się na głównej
          cat reports/current_report.md >> _site/index.md
          echo "</body></html>" >> _site/index.md
          
          # Kopiujemy również jako samodzielny plik dla spójności
          cp reports/current_report.md _site/report.md
          
          # Strona historii
          cat > _site/history.html << 'HIST'
          <!DOCTYPE html>
          <html lang="pl">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Historia Raportów</title>
            <style>
              body { 
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                max-width: 900px; margin: 0 auto; padding: 2rem;
                color: #1a1a2e; background: #f5f5f7;
              }
              .nav { background: #1a1a2e; color: white; padding: 1rem; margin: -2rem -2rem 2rem; text-align: center; }
              .nav a { color: #a5a0ff; margin: 0 1rem; }
              .report-link { display: block; padding: 1rem; margin: 0.5rem 0; 
                background: white; border-radius: 8px; text-decoration: none;
                color: #1a1a2e; border: 1px solid #ddd; }
              .report-link:hover { border-color: #6c63ff; box-shadow: 0 2px 8px rgba(108,99,255,0.2); }
            </style>
          </head>
          <body>
          <div class="nav">
            <strong>IlluminArt Ads Audit</strong>
            <a href="index.html">Aktualny raport</a>
            <a href="history.html">Historia</a>
          </div>
          <h1>Historia raportów</h1>
          HIST
          
          # Listuj raporty historyczne
          if [ -d "reports/history" ]; then
            for report in $(ls -r reports/history/*.md 2>/dev/null); do
              basename=$(basename "$report" .md)
              
              # Pliki historyczne dostaną nagłówek podobnie jak index
              cat > "_site/report-${basename}.md" << 'HIST_HEADER'
          <!DOCTYPE html>
          <html lang="pl">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Raport Audytu Marketingowego</title>
            <style>
              body { 
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                max-width: 900px; margin: 0 auto; padding: 2rem;
                color: #1a1a2e; background: #f5f5f7;
                line-height: 1.6;
              }
              table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
              th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
              th { background: #1a1a2e; color: white; }
              tr:nth-child(even) { background: #f9f9f9; }
              h1 { color: #1a1a2e; border-bottom: 3px solid #6c63ff; padding-bottom: 0.5rem; }
              h2 { color: #2d2d44; margin-top: 2rem; }
              h3 { color: #6c63ff; }
              code { background: #e8e8ee; padding: 2px 6px; border-radius: 3px; }
              a { color: #6c63ff; }
              .nav { background: #1a1a2e; color: white; padding: 1rem; margin: -2rem -2rem 2rem; text-align: center; }
              .nav a { color: #a5a0ff; margin: 0 1rem; }
            </style>
          </head>
          <body>
          <div class="nav">
            <strong>IlluminArt Ads Audit</strong>
            <a href="index.html">Aktualny raport</a>
            <a href="history.html">Historia</a>
          </div>
          HIST_HEADER
              cat "$report" >> "_site/report-${basename}.md"
              echo "</body></html>" >> "_site/report-${basename}.md"
              
              # W historii linkujemy do .html (Jekyll przetworzy .md -> .html)
              echo "<a class='report-link' href='report-${basename}.html'>📊 Raport z ${basename}</a>" >> _site/history.html
            done
          fi
          
          echo "</body></html>" >> _site/history.html
          
          # Użyj Jekyll do renderowania Markdown
          # Dodaj _config.yml
          cat > _site/_config.yml << 'CFG'
          theme: null
          markdown: kramdown
          CFG

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
